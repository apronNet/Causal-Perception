<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <!-- Static guide image for Launching Video Maker perceptual grouping. -->
  <title id="title">Perceptual grouping guide</title>
  <desc id="desc">A screenshot-style guide showing original-pair grouping and context-set grouping boxes.</desc>
  <rect width="980" height="520" fill="#eee7d8"/>
  <rect x="28" y="28" width="924" height="412" fill="#0b1917" stroke="#1f1c18" stroke-width="5"/>
  <rect x="118" y="72" width="510" height="80" fill="none" stroke="#d6a342" stroke-width="5"/>
  <rect x="100" y="196" width="760" height="186" fill="none" stroke="#76a79b" stroke-width="5"/>
  <g stroke="#706a5c" stroke-width="2" opacity=".55">
    <line x1="126" y1="112" x2="610" y2="112"/>
    <line x1="126" y1="242" x2="610" y2="242"/>
    <line x1="126" y1="334" x2="610" y2="334"/>
  </g>
  <g>
    <circle cx="180" cy="112" r="28" fill="#df4737" stroke="#8f2d24" stroke-width="5"/>
    <circle cx="560" cy="112" r="28" fill="#28c46a" stroke="#1c7f46" stroke-width="5"/>
    <circle cx="180" cy="242" r="28" fill="#df4737" stroke="#8f2d24" stroke-width="5"/>
    <circle cx="560" cy="242" r="28" fill="#28c46a" stroke="#1c7f46" stroke-width="5"/>
    <circle cx="180" cy="334" r="28" fill="#df4737" stroke="#8f2d24" stroke-width="5"/>
    <circle cx="560" cy="334" r="28" fill="#28c46a" stroke="#1c7f46" stroke-width="5"/>
  </g>
  <text x="656" y="116" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#d6a342">Original pair</text>
  <text x="656" y="270" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#76a79b">Context set</text>
  <text x="60" y="480" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#1f1c18">Grouping boxes can mark each pair separately, the original pair, or all context pairs together.</text>
</svg>
